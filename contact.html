========================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

    <!-- META TAGS -->
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <!-- TITLE -->
    <title>Contact Us | Smart Learning Portal</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CUSTOM CSS -->
    <link rel="stylesheet"
        href="css/style.css">

    <link rel="stylesheet"
        href="css/contact.css">

</head>

<body>

    <!-- =========================================
         CONTACT SECTION
    ========================================= -->

    <section class="contact-section py-5">

        <div class="container">

            <!-- TOPBAR -->
            <div class="contact-topbar d-flex flex-wrap justify-content-between align-items-center mb-5">

                <div>

                    <h2>
                        Contact Us
                    </h2>

                    <p class="text-muted mb-0">
                        We are here to help and support your learning journey.
                    </p>

                </div>

                <div class="topbar-buttons mt-3 mt-md-0 d-flex gap-2">

                    <button id="themeBtn"
                        class="btn btn-warning rounded-pill fw-medium px-4">

                        <i class="fa-solid fa-moon me-2"></i>

                        Dark Mode

                    </button>

                    <a href="dashboard.html"
                        class="btn btn-dark rounded-pill fw-medium px-4">

                        <i class="fa-solid fa-arrow-left me-2"></i>

                        Dashboard

                    </a>

                </div>

            </div>

            <!-- =========================================
                 CONTACT GRID
            ========================================= -->

            <div class="row g-4">

                <!-- CONTACT FORM -->
                <div class="col-lg-7">

                    <div class="contact-card p-4 shadow-sm bg-white rounded h-100">

                        <!-- ADDED CONTACT SUPPORT IMAGE -->
                        <div class="text-center mb-4">
                            <img src="./images/contact/contact-support.webp" alt="Contact Support" class="img-fluid rounded img-contact-md">
                        </div>

                        <h3 class="mb-4 fw-semibold border-bottom pb-2">
                            Send Message
                        </h3>

                        <form id="contactForm">

                            <div class="row g-4">

                                <!-- NAME -->
                                <div class="col-md-6">

                                    <label class="form-label fw-medium">
                                        Full Name
                                    </label>

                                    <input type="text"
                                        id="fullName"
                                        class="form-control bg-light"
                                        placeholder="Enter your name"
                                        required>

                                </div>

                                <!-- EMAIL -->
                                <div class="col-md-6">

                                    <label class="form-label fw-medium">
                                        Email Address
                                    </label>

                                    <input type="email"
                                        id="email"
                                        class="form-control bg-light"
                                        placeholder="Enter your email"
                                        required>

                                </div>

                                <!-- SUBJECT -->
                                <div class="col-12">

                                    <label class="form-label fw-medium">
                                        Subject
                                    </label>

                                    <input type="text"
                                        id="subject"
                                        class="form-control bg-light"
                                        placeholder="Enter subject"
                                        required>

                                </div>

                                <!-- MESSAGE -->
                                <div class="col-12">

                                    <label class="form-label fw-medium">
                                        Message
                                    </label>

                                    <textarea id="message"
                                        class="form-control bg-light"
                                        rows="6"
                                        placeholder="Write your message..."
                                        required></textarea>

                                </div>

                            </div>

                            <!-- BUTTON -->
                            <button type="submit"
                                class="btn btn-primary mt-4 px-5 py-2 fw-semibold rounded-pill w-100">

                                <i class="fa-solid fa-paper-plane me-2"></i>

                                Send Message

                            </button>

                        </form>

                    </div>

                </div>

                <!-- CONTACT INFO -->
                <div class="col-lg-5">

                    <div class="contact-info-card p-4 shadow-sm bg-white rounded h-100 d-flex flex-column">

                        <h3 class="mb-4 fw-semibold border-bottom pb-2">
                            Contact Information
                        </h3>

                        <!-- INFO ITEM -->
                        <div class="info-item d-flex gap-3 mb-4">

                            <div class="info-icon info-icon-sm bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center flex-shrink-0">

                                <i class="fa-solid fa-phone"></i>

                            </div>

                            <div>

                                <h5 class="mb-1 fw-semibold">
                                    Phone Number
                                </h5>

                                <p class="text-muted mb-0">
                                    03436448495
                                </p>

                            </div>

                        </div>

                        <!-- INFO ITEM -->
                        <div class="info-item d-flex gap-3 mb-4">

                            <div class="info-icon info-icon-sm bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center flex-shrink-0">

                                <i class="fa-solid fa-envelope"></i>

                            </div>

                            <div>

                                <h5 class="mb-1 fw-semibold">
                                    Email Address
                                </h5>

                                <p class="text-muted mb-0 text-break">
                                    muhammadaamir2495@gmail.com
                                </p>

                            </div>

                        </div>

                        <!-- INFO ITEM -->
                        <div class="info-item d-flex gap-3 mb-4">

                            <div class="info-icon info-icon-sm bg-danger bg-opacity-10 text-danger rounded-circle d-flex align-items-center justify-content-center flex-shrink-0">

                                <i class="fa-solid fa-location-dot"></i>

                            </div>

                            <div>

                                <h5 class="mb-1 fw-semibold">
                                    Address
                                </h5>

                                <p class="text-muted mb-0">
                                    Pakistan
                                </p>

                            </div>

                        </div>

                        <!-- SOCIAL LINKS -->
                        <div class="social-links d-flex gap-3 mt-2">

                            <a href="#" class="btn btn-outline-primary rounded-circle d-flex align-items-center justify-content-center icon-btn-sm" title="Facebook" aria-label="Contact us on Facebook">

                                <i class="fa-brands fa-facebook-f"></i>

                            </a>

                            <a href="#" class="btn btn-outline-danger rounded-circle d-flex align-items-center justify-content-center icon-btn-sm" title="Instagram" aria-label="Contact us on Instagram">

                                <i class="fa-brands fa-instagram"></i>

                            </a>

                            <a href="#" class="btn btn-outline-info rounded-circle d-flex align-items-center justify-content-center icon-btn-sm" title="LinkedIn" aria-label="Contact us on LinkedIn">

                                <i class="fa-brands fa-linkedin-in"></i>

                            </a>

                            <a href="#" class="btn btn-outline-dark rounded-circle d-flex align-items-center justify-content-center icon-btn-sm" title="GitHub" aria-label="Contact us on GitHub">

                                <i class="fa-brands fa-github"></i>

                            </a>

                        </div>

                        <!-- ADDED CONTACT MAP IMAGE -->
                        <div class="mt-auto pt-4 text-center">
                            <img src="images/illustrations/contact_map.png" alt="Our Location Map" class="img-fluid rounded shadow-sm w-100 img-hero-md">
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CONTACT JS -->
    <script src="js/contact.js"></script>

</body>

</html>
