<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | Smart Learning Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <section class="login-section">

        <div class="container">

            <div class="row justify-content-center align-items-center min-vh-100">

                <div class="col-lg-6 d-none d-lg-flex justify-content-center align-items-center mb-5 mb-lg-0">
                    <img src="images/illustrations/login_art.png" alt="Login Art" class="img-fluid px-4 img-hero-lg">
                </div>

                <div class="col-lg-5 col-md-8">

                    <div class="login-card p-4 shadow rounded bg-white">

                        <div class="text-center mb-4">
                            
                            <img src="images/auth/login-illustration.webp" alt="Login Illustration" class="img-fluid mb-3 img-md">

                            <div class="login-logo">

                                <i class="fa-solid fa-graduation-cap fa-2x text-warning mb-2"></i>

                            </div>

                            <h2 class="login-title fw-bold">
                                Welcome Back
                            </h2>

                            <p class="login-subtitle text-muted">
                                Login to continue your learning journey
                            </p>

                        </div>

                        <div id="loginAlert"></div>

                        <form id="loginForm">

                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Email Address
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text bg-light border-end-0">

                                        <i class="fa-solid fa-envelope text-muted"></i>

                                    </span>

                                    <input type="email"
                                        id="email"
                                        class="form-control border-start-0 ps-0"
                                        placeholder="Enter your email"
                                        required>

                                </div>

                            </div>

                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Password
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text bg-light border-end-0">

                                        <i class="fa-solid fa-lock text-muted"></i>

                                    </span>

                                    <input type="password"
                                        id="password"
                                        class="form-control border-start-0 border-end-0 ps-0"
                                        placeholder="Enter your password"
                                        required>

                                    <button type="button"
                                        id="togglePassword"
                                        class="btn border border-start-0 bg-white"
                                        title="Toggle Password Visibility"
                                        aria-label="Toggle Password Visibility">

                                        <i class="fa-solid fa-eye text-muted"></i>

                                    </button>

                                </div>

                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">

                                <div class="form-check">

                                    <input class="form-check-input"
                                        type="checkbox"
                                        id="rememberMe">

                                    <label class="form-check-label text-muted"
                                        for="rememberMe">

                                        Remember Me

                                    </label>

                                </div>

                                <a href="#"
                                    class="forgot-password text-decoration-none fw-semibold">

                                    Forgot Password?

                                </a>

                            </div>

                            <button type="submit"
                                class="btn btn-warning w-100 py-3 fw-bold rounded-pill text-dark shadow-sm">

                                <i class="fa-solid fa-right-to-bracket me-2"></i>

                                Login Account

                            </button>

                        </form>

                        <div class="divider d-flex align-items-center my-4">
                            <hr class="flex-grow-1">
                            <span class="mx-3 text-muted small fw-semibold">OR</span>
                            <hr class="flex-grow-1">
                        </div>

                        <div class="social-login d-flex justify-content-center gap-3">

                            <button class="btn btn-outline-secondary rounded-circle icon-btn-sm" title="Sign in with Google" aria-label="Sign in with Google">

                                <i class="fab fa-google"></i>

                            </button>

                            <button class="btn btn-outline-secondary rounded-circle icon-btn-sm" title="Sign in with Facebook" aria-label="Sign in with Facebook">

                                <i class="fab fa-facebook-f"></i>

                            </button>

                            <button class="btn btn-outline-secondary rounded-circle icon-btn-sm" title="Sign in with GitHub" aria-label="Sign in with GitHub">

                                <i class="fab fa-github"></i>

                            </button>

                        </div>

                        <div class="text-center mt-4">

                            <p class="register-text text-muted mb-0">

                                Don't have an account?

                                <a href="register.html" class="text-decoration-none fw-bold ms-1">
                                    Register Now
                                </a>

                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/auth.js"></script>

</body>

</html>
