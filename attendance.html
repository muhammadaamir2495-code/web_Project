     attendance.html
========================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

    <!-- META -->
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <!-- TITLE -->
    <title>Attendance Dashboard | Smart Learning Portal</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CUSTOM CSS -->
    <link rel="stylesheet"
        href="css/style.css">

    <link rel="stylesheet"
        href="css/attendance.css">

</head>

<body>

    <!-- =========================================
         ATTENDANCE SECTION
    ========================================= -->

    <section class="attendance-section py-5">

        <div class="container">

            <!-- TOPBAR -->
            <div class="attendance-topbar d-flex flex-wrap justify-content-between align-items-center mb-5">

                <div>

                    <h2>
                        Attendance Dashboard
                    </h2>

                    <p class="text-muted mb-0">
                        Monitor and manage student attendance records.
                    </p>

                </div>

                <div class="topbar-buttons mt-3 mt-md-0 d-flex gap-2">

                    <button id="themeBtn"
                        class="btn btn-warning rounded-pill fw-medium px-4">

                        <i class="fa-solid fa-moon me-2"></i>

                        Dark Mode

                    </button>

                    <a href="dashboard.html"
                        class="btn btn-dark rounded-pill fw-medium px-4">

                        <i class="fa-solid fa-arrow-left me-2"></i>

                        Dashboard

                    </a>

                </div>

            </div>

            <!-- =========================================
                 ATTENDANCE STATS
            ========================================= -->

            <div class="row g-4 mb-5">

                <!-- TOTAL CLASSES -->
                <div class="col-md-4">

                    <div class="attendance-card text-center p-4 shadow-sm bg-white rounded">

                        <div class="card-icon card-icon-sm bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex justify-content-center align-items-center mb-3">

                            <i class="fa-solid fa-book-open"></i>

                        </div>

                        <h3 id="totalClasses" class="fw-bold">
                            0
                        </h3>

                        <p class="text-muted mb-0">
                            Total Classes
                        </p>

                    </div>

                </div>

                <!-- PRESENT -->
                <div class="col-md-4">

                    <div class="attendance-card text-center p-4 shadow-sm bg-white rounded">

                        <div class="card-icon card-icon-sm bg-success bg-opacity-10 text-success rounded-circle d-inline-flex justify-content-center align-items-center mb-3">

                            <i class="fa-solid fa-circle-check"></i>

                        </div>

                        <h3 id="presentClasses" class="fw-bold">
                            0
                        </h3>

                        <p class="text-muted mb-0">
                            Present Classes
                        </p>

                    </div>

                </div>

                <!-- PERCENTAGE -->
                <div class="col-md-4">

                    <div class="attendance-card text-center p-4 shadow-sm bg-white rounded">

                        <div class="card-icon card-icon-sm bg-warning bg-opacity-10 text-warning rounded-circle d-inline-flex justify-content-center align-items-center mb-3">

                            <i class="fa-solid fa-chart-pie"></i>

                        </div>

                        <h3 id="attendancePercentage" class="fw-bold">
                            0%
                        </h3>

                        <p class="text-muted mb-0">
                            Attendance Percentage
                        </p>

                    </div>

                </div>

            </div>

            <!-- =========================================
                 MARK ATTENDANCE
            ========================================= -->

            <div class="attendance-form-card p-4 shadow-sm bg-white rounded mb-5">

                <h3 class="mb-4 fw-semibold">
                    Mark Attendance
                </h3>

                <form id="attendanceForm">

                    <div class="row g-4">

                        <!-- SUBJECT -->
                        <div class="col-md-4">

                            <label class="form-label fw-medium">
                                Subject Name
                            </label>

                            <input type="text"
                                id="subjectName"
                                class="form-control bg-light"
                                placeholder="Enter subject"
                                required>

                        </div>

                        <!-- DATE -->
                        <div class="col-md-4">

                            <label class="form-label fw-medium">
                                Date
                            </label>

                            <input type="date"
                                id="attendanceDate"
                                class="form-control bg-light"
                                title="Select date"
                                placeholder="Select date"
                                required>

                        </div>

                        <!-- STATUS -->
                        <div class="col-md-4">

                            <label class="form-label fw-medium">
                                Attendance Status
                            </label>

                            <select id="attendanceStatus"
                                class="form-select bg-light"
                                aria-label="Select attendance status"
                                title="Attendance Status"
                                required>

                                <option value="">
                                    Select Status
                                </option>

                                <option value="Present">
                                    Present
                                </option>

                                <option value="Absent">
                                    Absent
                                </option>

                            </select>

                        </div>

                    </div>

                    <!-- BUTTON -->
                    <button type="submit"
                        class="btn btn-primary mt-4 px-5 py-2 fw-semibold rounded-pill">

                        <i class="fa-solid fa-plus me-2"></i>

                        Add Attendance

                    </button>

                </form>

            </div>

            <!-- =========================================
                 TABLE SECTION
            ========================================= -->

            <div class="attendance-table-card p-4 shadow-sm bg-white rounded">

                <div class="table-header d-flex flex-wrap justify-content-between align-items-center mb-4">

                    <h3 class="fw-semibold mb-0">
                        Attendance Records
                    </h3>

                    <button id="deleteAllBtn"
                        class="btn btn-danger rounded-pill px-4 fw-medium mt-3 mt-md-0">

                        <i class="fa-solid fa-trash-can me-2"></i>
                        Delete All

                    </button>

                </div>

                <!-- TABLE -->
                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-light">

                            <tr>

                                <th>
                                    Subject
                                </th>

                                <th>
                                    Date
                                </th>

                                <th>
                                    Status
                                </th>

                                <th>
                                    Action
                                </th>

                            </tr>

                        </thead>

                        <tbody id="attendanceTableBody">

                            <!-- DYNAMIC DATA -->

                        </tbody>

                    </table>

                </div>

                <!-- EMPTY STATE -->
                <div id="emptyState"
                    class="empty-state text-center py-5 mt-3">

                    <!-- ADDED EMPTY STATE IMAGE -->
                    <img src="images/illustrations/empty_state.png" alt="No Attendance Records" class="img-fluid mb-4 img-md">

                    <h4 class="fw-semibold">
                        No Attendance Records
                    </h4>

                    <p class="text-muted">
                        Add attendance records to track your progress.
                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ATTENDANCE JS -->
    <script src="js/attendance.js"></script>

</body>

</html>
