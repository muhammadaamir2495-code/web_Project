<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Assignment Reminder | Smart Learning Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="css/style.css">

    <link rel="stylesheet"
        href="css/assignments.css">

</head>

<body>

    <section class="assignment-section py-5">

        <div class="container">

            <div class="assignment-topbar d-flex flex-wrap justify-content-between align-items-center mb-5">

                <div>

                    <h2>
                        Assignment Reminder
                    </h2>

                    <p class="text-muted mb-0">
                        Manage assignments, deadlines and progress efficiently.
                    </p>

                </div>

                <div class="topbar-buttons mt-3 mt-md-0 d-flex gap-2">

                    <button id="themeBtn"
                        class="btn btn-warning rounded-pill fw-medium px-4">

                        <i class="fa-solid fa-moon me-2"></i>

                        Dark Mode

                    </button>

                    <a href="dashboard.html"
                        class="btn btn-dark rounded-pill fw-medium px-4">

                        <i class="fa-solid fa-arrow-left me-2"></i>

                        Dashboard

                    </a>

                </div>

            </div>

            <div class="row g-4 mb-5">

                <div class="col-md-4">

                    <div class="assignment-card text-center p-4 shadow-sm bg-white rounded">

                        <div class="card-icon card-icon-sm bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex justify-content-center align-items-center mb-3">

                            <i class="fa-solid fa-book"></i>

                        </div>

                        <h3 id="totalAssignments" class="fw-bold">
                            0
                        </h3>

                        <p class="text-muted mb-0">
                            Total Assignments
                        </p>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="assignment-card text-center p-4 shadow-sm bg-white rounded">

                        <div class="card-icon card-icon-sm bg-success bg-opacity-10 text-success rounded-circle d-inline-flex justify-content-center align-items-center mb-3">

                            <i class="fa-solid fa-circle-check"></i>

                        </div>

                        <h3 id="completedAssignments" class="fw-bold">
                            0
                        </h3>

                        <p class="text-muted mb-0">
                            Completed Assignments
                        </p>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="assignment-card text-center p-4 shadow-sm bg-white rounded">

                        <div class="card-icon card-icon-sm bg-danger bg-opacity-10 text-danger rounded-circle d-inline-flex justify-content-center align-items-center mb-3">

                            <i class="fa-solid fa-clock"></i>

                        </div>

                        <h3 id="pendingAssignments" class="fw-bold">
                            0
                        </h3>

                        <p class="text-muted mb-0">
                            Pending Assignments
                        </p>

                    </div>

                </div>

            </div>

            <div class="assignment-form-card p-4 shadow-sm bg-white rounded mb-5">

                <h3 class="mb-4 fw-semibold">
                    Add New Assignment
                </h3>

                <form id="assignmentForm">

                    <div class="row g-4">

                        <div class="col-md-6">

                            <label class="form-label fw-medium">
                                Assignment Title
                            </label>

                            <input type="text"
                                id="assignmentTitle"
                                class="form-control bg-light"
                                placeholder="Enter assignment title"
                                required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-medium">
                                Subject Name
                            </label>

                            <input type="text"
                                id="assignmentSubject"
                                class="form-control bg-light"
                                placeholder="Enter subject name"
                                required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-medium" for="assignmentDeadline">
                                Deadline
                            </label>

                            <input type="date"
                                id="assignmentDeadline"
                                class="form-control bg-light"
                                title="Assignment Deadline"
                                placeholder="Select due date"
                                required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-medium" for="assignmentStatus">
                                Status
                            </label>

                            <select id="assignmentStatus"
                                class="form-select bg-light"
                                aria-label="Filter assignments by status"
                                title="Assignment Status"
                                required>

                                <option value="">
                                    Select Status
                                </option>

                                <option value="Pending">
                                    Pending
                                </option>

                                <option value="Completed">
                                    Completed
                                </option>

                            </select>

                        </div>

                    </div>

                    <button type="submit"
                        class="btn btn-primary mt-4 px-5 py-2 fw-semibold rounded-pill">

                        <i class="fa-solid fa-plus me-2"></i>

                        Add Assignment

                    </button>

                </form>

            </div>

            <div class="assignment-table-card p-4 shadow-sm bg-white rounded">

                <div class="table-header d-flex flex-wrap justify-content-between align-items-center mb-4">

                    <h3 class="fw-semibold mb-0">
                        Assignment Records
                    </h3>

                    <button id="deleteAllBtn"
                        class="btn btn-danger rounded-pill px-4 fw-medium mt-3 mt-md-0">

                        <i class="fa-solid fa-trash-can me-2"></i>
                        Delete All

                    </button>

                </div>

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-light">

                            <tr>

                                <th>
                                    Title
                                </th>

                                <th>
                                    Subject
                                </th>

                                <th>
                                    Deadline
                                </th>

                                <th>
                                    Status
                                </th>

                                <th>
                                    Action
                                </th>

                            </tr>

                        </thead>

                        <tbody id="assignmentTableBody">

                            </tbody>

                    </table>

                </div>

                <div id="emptyState"
                    class="empty-state text-center py-5 mt-3">

                    <img src="images/empty-states/no-assignments.webp" alt="No Assignments Found" class="img-fluid mb-4">

                    <h4 class="fw-semibold">
                        No Assignments Found
                    </h4>

                    <p class="text-muted">
                        Add assignments to manage your tasks.
                    </p>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/assignments.js"></script>

</body>

</html>
