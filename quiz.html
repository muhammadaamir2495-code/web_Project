<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Quiz Module | Smart Learning Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="css/style.css">

    <link rel="stylesheet"
        href="css/quiz.css">

</head>

<body>

    <section class="quiz-section py-5">

        <div class="container">

            <div class="quiz-topbar d-flex justify-content-between align-items-center mb-4">

                <a href="dashboard.html"
                    class="btn btn-dark rounded-pill fw-medium px-4">

                    <i class="fa-solid fa-arrow-left me-2"></i>

                    Back Dashboard

                </a>

                <button id="darkModeToggle"
                    class="btn btn-warning rounded-pill fw-medium px-4">

                    <i class="fa-solid fa-moon me-2"></i>

                    Dark Mode

                </button>

            </div>

            <div class="quiz-card p-4 shadow-sm bg-white rounded">

                <div class="text-center mb-4">
                    <img src="images/quiz/quiz-module.webp" alt="Quiz Module" class="img-fluid rounded img-quiz">
                </div>

                <div class="quiz-header d-flex flex-wrap justify-content-between align-items-center border-bottom pb-3 mb-4">

                    <div>

                        <h2 class="fw-bold mb-1">
                            JavaScript Advanced Quiz
                        </h2>

                        <p class="text-muted mb-0">
                            Test your front-end development skills
                        </p>

                    </div>

                    <div class="quiz-timer mt-3 mt-md-0 bg-light px-4 py-2 rounded-pill fw-bold text-danger border border-danger border-opacity-25">

                        <i class="fa-regular fa-clock me-2"></i>

                        <span id="timer">
                            10:00
                        </span>

                    </div>

                </div>

                <div class="quiz-progress mb-4">

                    <div class="progress progress-sm">

                        <div id="progressBar"
                            class="progress-bar progress-bar-striped progress-bar-animated bg-primary progress-fill-0 w-100">

                        </div>

                    </div>

                </div>

                <div class="question-container mb-5">

                    <h5 id="questionNumber" class="text-primary fw-semibold mb-3">
                        Question 1 of 10
                    </h5>

                    <h3 id="questionText"
                        class="question-text fw-semibold mb-4">

                        Loading question...

                    </h3>

                    <div id="optionsContainer"
                        class="options-container d-grid gap-3">

                    </div>

                </div>

                <div class="quiz-buttons d-flex justify-content-between align-items-center border-top pt-4">

                    <button id="previousBtn"
                        class="btn btn-outline-secondary px-4 py-2 fw-medium rounded-pill">

                        <i class="fa-solid fa-arrow-left me-2"></i>

                        Previous

                    </button>

                    <button id="nextBtn"
                        class="btn btn-primary px-5 py-2 fw-semibold rounded-pill ms-auto">

                        Next

                        <i class="fa-solid fa-arrow-right ms-2"></i>

                    </button>

                    <button id="submitBtn"
                        class="btn btn-success px-5 py-2 fw-semibold rounded-pill d-none ms-auto">

                        Submit Quiz

                        <i class="fa-solid fa-check ms-2"></i>

                    </button>

                </div>

            </div>

            <div id="resultCard"
                class="result-card d-none text-center p-5 shadow-sm bg-white rounded mt-4">

                <div class="result-icon text-warning mb-4 fs-4xl">

                    <i class="fa-solid fa-trophy"></i>

                </div>

                <h2 class="fw-bold mb-3">
                    Quiz Completed 🎉
                </h2>

                <h3 id="scoreText" class="text-primary fw-semibold mb-3">
                    Your Score: 0/10
                </h3>

                <p id="performanceText" class="text-muted fs-5 mb-5">
                    Excellent Performance!
                </p>

                <div class="result-buttons d-flex justify-content-center gap-3">

                    <button id="restartBtn"
                        class="btn btn-warning rounded-pill px-4 py-2 fw-semibold">

                        Restart Quiz

                    </button>

                    <a href="dashboard.html"
                        class="btn btn-dark rounded-pill px-4 py-2 fw-medium">

                        Back Dashboard

                    </a>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/quiz.js"></script>

</body>

</html>
