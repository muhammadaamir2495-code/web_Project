<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Notes Section | Smart Learning Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="css/style.css">

    <link rel="stylesheet"
        href="css/notes.css">

</head>

<body>

    <section class="notes-section py-5">

        <div class="container">

            <div class="notes-topbar d-flex flex-wrap justify-content-between align-items-center mb-5">

                <div>

                    <h2>
                        Smart Notes Manager
                    </h2>

                    <p class="text-muted mb-0">
                        Create, manage and organize your study notes
                    </p>

                </div>

                <div class="topbar-buttons mt-3 mt-md-0 d-flex gap-2">

                    <button id="themeBtn"
                        class="btn btn-warning rounded-pill fw-medium px-4">

                        <i class="fa-solid fa-moon me-2"></i>

                        Dark Mode

                    </button>

                    <a href="dashboard.html"
                        class="btn btn-dark rounded-pill fw-medium px-4">

                        <i class="fa-solid fa-arrow-left me-2"></i>

                        Dashboard

                    </a>

                </div>

            </div>

            <div class="add-note-card p-4 shadow-sm bg-white rounded mb-5">

                <h4 class="mb-4 fw-semibold">
                    Add New Note
                </h4>

                <form id="noteForm">

                    <div class="row g-4">

                        <div class="col-md-6">

                            <label class="form-label fw-medium">
                                Note Title
                            </label>

                            <input type="text"
                                id="noteTitle"
                                class="form-control bg-light"
                                placeholder="Enter note title"
                                required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-medium">
                                Category
                            </label>

                            <select id="noteCategory"
                                class="form-select bg-light"
                                aria-label="Select note category"
                                title="Note Category"
                                required>

                                <option value="">
                                    Select Category
                                </option>

                                <option value="HTML">
                                    HTML
                                </option>

                                <option value="CSS">
                                    CSS
                                </option>

                                <option value="JavaScript">
                                    JavaScript
                                </option>

                                <option value="Bootstrap">
                                    Bootstrap
                                </option>

                            </select>

                        </div>

                        <div class="col-12">

                            <label class="form-label fw-medium">
                                Note Content
                            </label>

                            <textarea id="noteContent"
                                class="form-control bg-light"
                                rows="6"
                                placeholder="Write your note here..."
                                required></textarea>

                        </div>

                    </div>

                    <button type="submit"
                        class="btn btn-primary mt-4 px-5 py-2 fw-semibold rounded-pill">

                        <i class="fa-solid fa-plus me-2"></i>

                        Add Note

                    </button>

                </form>

            </div>

            <div class="filter-section p-4 shadow-sm bg-white rounded mb-4">

                <div class="row g-3">

                    <div class="col-md-6">

                        <input type="text"
                            id="searchInput"
                            class="form-control bg-light"
                            placeholder="Search notes...">

                    </div>

                    <div class="col-md-4">

                        <select id="filterCategory"
                            class="form-select bg-light"
                            aria-label="Filter notes by category"
                            title="Filter Category">

                            <option value="All">
                                All Categories
                            </option>

                            <option value="HTML">
                                HTML
                            </option>

                            <option value="CSS">
                                CSS
                            </option>

                            <option value="JavaScript">
                                JavaScript
                            </option>

                            <option value="Bootstrap">
                                Bootstrap
                            </option>

                        </select>

                    </div>

                    <div class="col-md-2">

                        <button id="deleteAllBtn"
                            class="btn btn-danger w-100 fw-medium">

                            Delete All

                        </button>

                    </div>

                </div>

            </div>

            <div id="notesContainer"
                class="notes-grid">

                </div>

            <div id="emptyState"
                class="empty-state text-center py-5 mt-3">

                <img src="images/illustrations/empty_state.png" alt="No Notes Found" class="img-fluid mb-4 img-md">

                <h3 class="fw-semibold">
                    No Notes Found
                </h3>

                <p class="text-muted">
                    Start adding your smart learning notes now.
                </p>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/notes.js"></script>

</body>

</html>
